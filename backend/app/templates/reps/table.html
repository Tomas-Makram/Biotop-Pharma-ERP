<div id="reps-table" data-total="{{ reps|length }}">
  {% if reps|length == 0 %}
    <div class="p-3">
      <div class="alert alert-info mb-0">لا توجد موظفين مضافة حتى الآن.</div>
    </div>
  {% else %}
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 80px;">ID</th>
            <th>كود الموظف</th>
            <th>الاسم</th>
            <th>المحمول</th>
            <th>الوظيفة</th>
            <th>المرتب الأساسي</th>
            <th style="width: 140px;" class="text-end">إجراءات</th>
          </tr>
        </thead>
        <tbody>
          {% for r in reps %}
          <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.code or '-' }}</td>
            <td>{{ r.name }}</td>
            <td>{{ r.mobile or '-' }}</td>
            <td>{{ r.job_title or '-' }}</td>
            <td>{{ r.base_salary }}</td>
            <td class="text-end">
              <details class="d-inline-block ms-2">
                <summary class="btn btn-sm btn-outline-secondary">تعديل</summary>
                <form class="mt-2" hx-post="/reps/{{ r.id }}/update" hx-target="#tableContainer" hx-swap="innerHTML" data-alert-success="تم تعديل الموظف" data-alert-fail="فشل تعديل الموظف">
                  <div class="mb-2">
                    <label class="form-label">الاسم</label>
                    <input name="name" class="form-control" value="{{ r.name }}" required />
                  </div>
                  <div class="mb-2">
                    <label class="form-label">الهاتف</label>
                    <input name="phone" class="form-control" value="{{ r.phone or '' }}" />
                  </div>
                  <div class="mb-2">
                    <label class="form-label">المحمول</label>
                    <input name="mobile" class="form-control" value="{{ r.mobile or '' }}" />
                  </div>
                  <div class="mb-2">
                    <label class="form-label">الوظيفة</label>
                    <input name="job_title" class="form-control" value="{{ r.job_title or '' }}" />
                  </div>
                  <div class="mb-2">
                    <label class="form-label">ملاحظات</label>
                    <input name="notes" class="form-control" value="{{ r.notes or '' }}" />
                  </div>
                  <button class="btn btn-sm btn-success">حفظ</button>
                </form>
              </details>
              <button class="btn btn-danger btn-sm" hx-delete="/reps/{{ r.id }}" hx-target="#tableContainer" hx-confirm="هل أنت متأكد من الحذف؟" data-alert-success="تم حذف الموظف" data-alert-fail="فشل حذف الموظف">
                حذف
              </button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% endif %}
</div>
