<div class="row g-3">
  <div class="col-12">
    <div class="card p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h2 class="h4 m-0">التحويلات</h2>
        <button class="btn btn-primary" hx-get="/currencies/section/transfers-new" hx-target="#currenciesSection" hx-swap="innerHTML">تحويل جديد</button>
      </div>
      <div class="muted mt-2">عرض سجل التحويلات بين المخازن والجهات.</div>
    </div>
  </div>
  <div class="col-12">
    <div class="card p-0 overflow-hidden">
      <div class="p-3 d-flex align-items-center justify-content-between">
        <h2 class="h5 m-0">سجل التحويلات</h2>
        <div class="muted">الإجمالي: <span data-total-count>{{ transfers|length }}</span></div>
      </div>
      <div id="tableContainer">
        {% include "transfers/table.html" %}
      </div>
    </div>
  </div>
</div>
