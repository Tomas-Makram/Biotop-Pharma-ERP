{% extends "base.html" %}

{% block title %}فاتورة شراء جديدة{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
  <h1 class="h3 m-0">فاتورة شراء جديدة</h1>
  <a class="btn btn-outline-secondary" href="/purchases">عرض الفواتير</a>
</div>

<form method="post" action="/purchases/new" class="card p-4" id="purchaseForm">
  <div class="row g-3">
    <div class="col-12 col-md-3">
      <label class="form-label">التاريخ</label>
      <input name="date" type="date" class="form-control" />
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">المورد</label>
      <select name="supplier_id" class="form-select">
        <option value="">اختر</option>
        {% for s in suppliers %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label">رقم الفاتورة</label>
      <input name="invoice_no" class="form-control" />
    </div>
    <div class="col-12 col-md-2">
      <label class="form-label">تكلفة الشحن</label>
      <input name="shipping_cost" class="form-control" inputmode="decimal" value="0" />
    </div>
    <div class="col-12">
      <label class="form-label">ملاحظات</label>
      <input name="notes" class="form-control" />
    </div>
  </div>

  <hr class="my-4" />

  <div class="d-flex align-items-center justify-content-between mb-2">
    <h2 class="h5 m-0">بنود الفاتورة</h2>
    <button type="button" class="btn btn-outline-primary" id="addRow">إضافة بند</button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered align-middle" id="itemsTable">
      <thead class="table-light">
        <tr>
          <th>الصنف</th>
          <th style="width: 140px;">كود التشغيل</th>
          <th style="width: 120px;">الكمية</th>
          <th style="width: 140px;">سعر الشراء</th>
          <th style="width: 140px;">الإجمالي</th>
          <th style="width: 80px;">حذف</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="text-end">
    <button class="btn btn-success">حفظ الفاتورة</button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
  const items = {{ items|tojson }};
  const tbody = document.querySelector('#itemsTable tbody');

  function addRow() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <select name="item_id" class="form-select" required>
          <option value="">اختر صنف</option>
          ${items.map(i => `<option value="${i.id}">${i.name}</option>`).join('')}
        </select>
      </td>
      <td><input name="lot_code" class="form-control" required /></td>
      <td><input name="qty" class="form-control" inputmode="decimal" value="0" /></td>
      <td><input name="unit_price" class="form-control" inputmode="decimal" value="0" /></td>
      <td><input class="form-control" value="0" readonly /></td>
      <td class="text-center"><button type="button" class="btn btn-sm btn-danger">حذف</button></td>
    `;
    tbody.appendChild(tr);
  }

  function recalcRow(tr) {
    const qty = parseFloat(tr.querySelector('input[name="qty"]').value || '0');
    const price = parseFloat(tr.querySelector('input[name="unit_price"]').value || '0');
    const total = qty * price;
    tr.querySelector('td:nth-child(5) input').value = total.toFixed(2);
  }

  function fillPriceFromItem(tr) {
    const select = tr.querySelector('select[name="item_id"]');
    const itemId = select.value;
    const item = items.find(i => String(i.id) === String(itemId));
    if (!item) return;
    const priceInput = tr.querySelector('input[name="unit_price"]');
    priceInput.value = (item.purchase_price ?? 0).toFixed(2);
    recalcRow(tr);
  }

  document.getElementById('addRow').addEventListener('click', addRow);

  tbody.addEventListener('change', (e) => {
    if (e.target.matches('select[name="item_id"]')) {
      const tr = e.target.closest('tr');
      if (tr) fillPriceFromItem(tr);
    }
  });

  tbody.addEventListener('input', (e) => {
    const tr = e.target.closest('tr');
    if (tr) recalcRow(tr);
  });

  tbody.addEventListener('click', (e) => {
    if (e.target.matches('.btn-danger')) {
      e.target.closest('tr').remove();
    }
  });

  addRow();
</script>
{% endblock %}
