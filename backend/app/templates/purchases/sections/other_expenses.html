<div class="card p-4">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <h1 class="h4 m-0">مصاريف أخرى</h1>
    <div class="muted">تسجيل مصروف من الخزنة الرئيسية</div>
  </div>

  <hr class="my-4"/>

  <form class="row g-3 align-items-end" hx-post="/purchases/other-expenses" hx-target="#otherExpensesTableContainer" hx-swap="innerHTML" data-alert-success="تم حفظ المصروف" data-alert-fail="تعذر حفظ المصروف">
    <div class="col-12 col-md-6">
      <label class="form-label">الجهة</label>
      <input name="title" class="form-control" required />
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">المبلغ</label>
      <input name="amount" type="number" step="0.01" class="form-control" value="0" />
    </div>
    <div class="col-12 col-md-2 d-grid">
      <button class="btn btn-success" type="submit">حفظ</button>
    </div>
  </form>
</div>

<div class="card p-0 overflow-hidden mt-3">
  <div class="p-3 d-flex align-items-center justify-content-between">
    <h2 class="h5 m-0">سجل المصاريف الأخرى</h2>
    <div class="muted">الإجمالي: <span data-total-count>{{ expenses|length }}</span></div>
  </div>
  <div id="otherExpensesTableContainer">
    {% include "purchases/other_expenses_table.html" %}
  </div>
</div>
