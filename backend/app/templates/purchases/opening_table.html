<div id="supplier-opening-table" data-total="{{ suppliers|length }}">
  {% if suppliers|length == 0 %}
    <div class="p-3">
      <div class="alert alert-info mb-0">لا توجد موردين حتى الآن.</div>
    </div>
  {% else %}
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 80px;">ID</th>
            <th>المورد</th>
            <th>الرصيد الافتتاحي</th>
          </tr>
        </thead>
        <tbody>
          {% for s in suppliers %}
          <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ opening_map.get(s.id, 0) }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% endif %}
</div>
