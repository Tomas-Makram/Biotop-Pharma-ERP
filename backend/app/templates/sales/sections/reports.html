<div class="sales-reports" dir="rtl">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <div class="h5 m-0">تقارير المبيعات</div>
      <div class="muted">تقارير فواتير ومرتجعات ومبيعات الأصناف</div>
    </div>
    <div class="d-flex gap-2 no-print">
      <button id="salesReportsFetch" class="btn btn-primary">عرض</button>
      <button id="salesReportsPrint" class="btn btn-outline-secondary">طباعة</button>
    </div>
  </div>

  <div class="reports-bar no-print">
    <div class="reports-scroll" id="salesReportsBar">
      <button class="report-tab active" data-report="sales-invoices-list">كشف فواتير المبيعات</button>
      <button class="report-tab" data-report="sales-returns-list">كشف مرتجعات المبيعات</button>
      <button class="report-tab" data-report="item-sales-report">تقرير مبيعات أصناف</button>
      <button class="report-tab" data-report="item-sales-volume">حجم مبيعات أصناف</button>
      <button class="report-tab" data-report="customer-sales-summary">مبيعات العملاء</button>
      <button class="report-tab" data-report="rep-sales-summary">مبيعات مندوب</button>
      <button class="report-tab" data-report="sales-profit-report">أرباح المبيعات</button>
    </div>
  </div>

  <div class="card p-3 mb-3 no-print" id="salesFiltersPanel">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-3 filter-block" data-filter="date">
        <label class="form-label">من تاريخ</label>
        <input id="filterDateFrom" type="date" class="form-control" />
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="date">
        <label class="form-label">إلى تاريخ</label>
        <input id="filterDateTo" type="date" class="form-control" />
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="customer">
        <label class="form-label">العميل</label>
        <select id="filterCustomer" class="form-select" data-no-search>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="rep">
        <label class="form-label">المندوب</label>
        <select id="filterRep" class="form-select" data-no-search>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="warehouse">
        <label class="form-label">المخزن</label>
        <select id="filterWarehouse" class="form-select" data-no-search>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="item">
        <label class="form-label">الصنف</label>
        <select id="filterItem" class="form-select" data-no-search>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="category">
        <label class="form-label">الفئة</label>
        <select id="filterCategory" class="form-select" data-no-search>
          <option value="">الكل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="invoice-type">
        <label class="form-label">نوع الفاتورة</label>
        <select id="filterInvoiceType" class="form-select" data-no-search>
          <option value="">الكل</option>
          <option value="cash">نقدي</option>
          <option value="credit">آجل</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="doc">
        <label class="form-label">رقم المستند</label>
        <input id="filterDocNo" type="text" class="form-control" />
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="sort">
        <label class="form-label">الترتيب</label>
        <select id="filterSortBy" class="form-select" data-no-search>
          <option value="date">حسب التاريخ</option>
          <option value="doc_no">حسب المستند</option>
        </select>
      </div>
      <div class="col-12 col-md-3 filter-block" data-filter="sort">
        <label class="form-label">اتجاه الترتيب</label>
        <select id="filterSortDir" class="form-select" data-no-search>
          <option value="asc">تصاعدي</option>
          <option value="desc">تنازلي</option>
        </select>
      </div>
    </div>
  </div>

  <div id="pageAlert" class="alert alert-danger d-none" role="alert"></div>
  <div id="loadingBox" class="alert alert-info d-none" role="alert">جاري تحميل التقرير...</div>

  <div id="print-area" class="print-area">
    <div class="print-header">
      <div class="fw-semibold" data-print-title>عنوان التقرير</div>
      <div class="small muted" data-print-date></div>
      <div class="small muted" data-print-filters></div>
    </div>
    <div class="card p-3">
      <div class="fw-semibold mb-3" id="reportTitle">كشف فواتير المبيعات</div>
      <div class="table-responsive">
        <table class="table table-bordered mb-0">
          <thead class="table-light">
            <tr id="reportHead">
              <th>العمود</th>
            </tr>
          </thead>
          <tbody id="reportBody">
            <tr>
              <td class="text-center muted">اضغط عرض لإظهار البيانات.</td>
            </tr>
          </tbody>
          <tfoot id="reportFooter" class="d-none">
            <tr class="table-light" id="reportFooterRow"></tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>
</div>

<style>
  .reports-bar {
    background: #f3f5f9;
    border-radius: 12px;
    padding: 8px;
    overflow: hidden;
  }
  .reports-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .report-tab {
    border: 1px solid #d0d7de;
    background: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
    cursor: pointer;
  }
  .report-tab.active {
    background: #0d6efd;
    border-color: #0d6efd;
    color: #fff;
  }
  .filter-block { display: none; }
  .filter-block.active { display: block; }

  @media print {
    body { background: #fff !important; }
    .no-print { display: none !important; }
    #print-area { display: block !important; }
    #print-area * { direction: rtl; text-align: right; }
  }
</style>

<script>
  (function () {
    const reportConfig = {
      "sales-invoices-list": {
        title_ar: "كشف فواتير المبيعات",
        filters: ["date", "customer", "rep", "warehouse", "invoice-type", "doc", "sort"],
        columns: [
          { key: "invoice_no", label_ar: "رقم الفاتورة" },
          { key: "invoice_date", label_ar: "التاريخ" },
          { key: "customer_name", label_ar: "العميل" },
          { key: "rep_name", label_ar: "المندوب" },
          { key: "warehouse_name", label_ar: "المخزن" },
          { key: "net_amount", label_ar: "الصافي" },
          { key: "tax_amount", label_ar: "الضريبة" },
          { key: "total_amount", label_ar: "الإجمالي" },
          { key: "payment_type", label_ar: "طريقة السداد" }
        ],
        totals: ["net_sum", "total_sum", "invoices_count"]
      },
      "sales-returns-list": {
        title_ar: "كشف مرتجعات المبيعات",
        filters: ["date", "customer", "rep", "doc", "sort"],
        columns: [
          { key: "return_no", label_ar: "رقم المرتجع" },
          { key: "return_date", label_ar: "التاريخ" },
          { key: "customer_name", label_ar: "العميل" },
          { key: "rep_name", label_ar: "المندوب" },
          { key: "net_amount", label_ar: "الصافي" },
          { key: "tax_amount", label_ar: "الضريبة" },
          { key: "total_amount", label_ar: "الإجمالي" }
        ],
        totals: ["net_sum", "total_sum", "returns_count"]
      },
      "item-sales-report": {
        title_ar: "تقرير مبيعات أصناف",
        filters: ["date", "item", "customer", "warehouse", "doc", "sort"],
        columns: [
          { key: "invoice_no", label_ar: "رقم الفاتورة" },
          { key: "invoice_date", label_ar: "التاريخ" },
          { key: "customer_name", label_ar: "العميل" },
          { key: "item_code", label_ar: "كود الصنف" },
          { key: "item_name", label_ar: "اسم الصنف" },
          { key: "qty", label_ar: "الكمية" },
          { key: "unit_price", label_ar: "سعر البيع" },
          { key: "discount", label_ar: "خصم %" },
          { key: "net_amount", label_ar: "الصافي" },
          { key: "total_amount", label_ar: "الإجمالي" }
        ],
        totals: ["qty_sum", "net_sum", "total_sum"]
      },
      "item-sales-volume": {
        title_ar: "حجم مبيعات أصناف",
        filters: ["date", "category", "warehouse", "sort"],
        columns: [
          { key: "item_code", label_ar: "كود الصنف" },
          { key: "item_name", label_ar: "اسم الصنف" },
          { key: "qty_sold", label_ar: "الكمية" },
          { key: "avg_unit_price", label_ar: "متوسط السعر" },
          { key: "total_sales", label_ar: "إجمالي المبيعات" },
          { key: "last_sale_date", label_ar: "آخر بيع" }
        ],
        totals: ["qty_sum", "total_sales_sum", "items_count"]
      },
      "customer-sales-summary": {
        title_ar: "مبيعات العملاء",
        filters: ["date", "customer", "sort"],
        columns: [
          { key: "customer_name", label_ar: "العميل" },
          { key: "invoices_count", label_ar: "عدد الفواتير" },
          { key: "qty_sum", label_ar: "إجمالي الكمية" },
          { key: "net_sales", label_ar: "الصافي" },
          { key: "total_sales", label_ar: "إجمالي المبيعات" }
        ],
        totals: ["total_sales_sum", "customers_count"]
      },
      "rep-sales-summary": {
        title_ar: "مبيعات مندوب",
        filters: ["date", "rep", "sort"],
        columns: [
          { key: "rep_name", label_ar: "المندوب" },
          { key: "invoices_count", label_ar: "عدد الفواتير" },
          { key: "customers_count", label_ar: "عدد العملاء" },
          { key: "net_sales", label_ar: "الصافي" },
          { key: "total_sales", label_ar: "إجمالي المبيعات" }
        ],
        totals: ["total_sales_sum", "reps_count"]
      },
      "sales-profit-report": {
        title_ar: "أرباح المبيعات",
        filters: ["date", "item", "category", "sort"],
        columns: [
          { key: "item_code", label_ar: "كود الصنف" },
          { key: "item_name", label_ar: "اسم الصنف" },
          { key: "qty_sold", label_ar: "الكمية" },
          { key: "total_sales", label_ar: "إجمالي المبيعات" },
          { key: "total_cost", label_ar: "إجمالي التكلفة" },
          { key: "profit_amount", label_ar: "الربح" },
          { key: "profit_margin", label_ar: "هامش الربح %" }
        ],
        totals: ["total_sales_sum", "total_cost_sum", "total_profit_sum"]
      }
    };

    const state = { reportKey: "sales-invoices-list" };
    const tabs = document.querySelectorAll(".report-tab");
    const reportTitle = document.getElementById("reportTitle");
    const reportHead = document.getElementById("reportHead");
    const reportBody = document.getElementById("reportBody");
    const reportFooter = document.getElementById("reportFooter");
    const reportFooterRow = document.getElementById("reportFooterRow");
    const filterBlocks = document.querySelectorAll(".filter-block");
    const pageAlert = document.getElementById("pageAlert");
    const loadingBox = document.getElementById("loadingBox");

    const filterDateFrom = document.getElementById("filterDateFrom");
    const filterDateTo = document.getElementById("filterDateTo");
    const filterCustomer = document.getElementById("filterCustomer");
    const filterRep = document.getElementById("filterRep");
    const filterWarehouse = document.getElementById("filterWarehouse");
    const filterItem = document.getElementById("filterItem");
    const filterCategory = document.getElementById("filterCategory");
    const filterInvoiceType = document.getElementById("filterInvoiceType");
    const filterDocNo = document.getElementById("filterDocNo");
    const filterSortBy = document.getElementById("filterSortBy");
    const filterSortDir = document.getElementById("filterSortDir");

    function showAlert(message) {
      pageAlert.textContent = message;
      pageAlert.classList.remove("d-none");
    }

    function hideAlert() {
      pageAlert.classList.add("d-none");
    }

    function setLoading(isLoading) {
      loadingBox.classList.toggle("d-none", !isLoading);
    }

    function formatNumber(value) {
      const num = Number(value || 0);
      return num.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function applyFiltersUI() {
      const config = reportConfig[state.reportKey];
      filterBlocks.forEach((block) => {
        const key = block.getAttribute("data-filter");
        block.classList.toggle("active", config.filters.includes(key));
      });
    }

    function renderTable(data) {
      const config = reportConfig[state.reportKey];
      const columns = data.columns && data.columns.length ? data.columns : config.columns;

      reportTitle.textContent = data.title_ar || config.title_ar;
      reportHead.innerHTML = "";
      reportBody.innerHTML = "";

      columns.forEach((col) => {
        const th = document.createElement("th");
        th.textContent = col.label_ar || col.key;
        reportHead.appendChild(th);
      });

      const rows = data.rows || [];
      if (!rows.length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="${columns.length}" class="text-center muted">لا توجد بيانات.</td>`;
        reportBody.appendChild(tr);
      } else {
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          tr.innerHTML = columns.map((col) => {
            const value = row[col.key];
            if (typeof value === "number") {
              return `<td>${formatNumber(value)}</td>`;
            }
            return `<td>${value ?? ""}</td>`;
          }).join("");
          reportBody.appendChild(tr);
        });
      }

      const totals = data.totals || {};
      if (Object.keys(totals).length) {
        reportFooter.classList.remove("d-none");
        reportFooterRow.innerHTML = columns.map((col, idx) => {
          if (idx === 0) return `<th>الإجمالي</th>`;
          if (col.key === "net_amount" && totals.net_sum !== undefined) {
            return `<th>${formatNumber(totals.net_sum)}</th>`;
          }
          if (col.key === "total_amount" && totals.total_sum !== undefined) {
            return `<th>${formatNumber(totals.total_sum)}</th>`;
          }
          if (col.key === "qty" && totals.qty_sum !== undefined) {
            return `<th>${formatNumber(totals.qty_sum)}</th>`;
          }
          if (col.key === "qty_sold" && totals.qty_sum !== undefined) {
            return `<th>${formatNumber(totals.qty_sum)}</th>`;
          }
          if (col.key === "total_sales" && totals.total_sales_sum !== undefined) {
            return `<th>${formatNumber(totals.total_sales_sum)}</th>`;
          }
          if (col.key === "total_cost" && totals.total_cost_sum !== undefined) {
            return `<th>${formatNumber(totals.total_cost_sum)}</th>`;
          }
          if (col.key === "profit_amount" && totals.total_profit_sum !== undefined) {
            return `<th>${formatNumber(totals.total_profit_sum)}</th>`;
          }
          if (col.key === "customer_name" && totals.customers_count !== undefined) {
            return `<th>${totals.customers_count}</th>`;
          }
          if (col.key === "rep_name" && totals.reps_count !== undefined) {
            return `<th>${totals.reps_count}</th>`;
          }
          if (col.key === "invoice_no" && totals.invoices_count !== undefined) {
            return `<th>${totals.invoices_count}</th>`;
          }
          if (col.key === "return_no" && totals.returns_count !== undefined) {
            return `<th>${totals.returns_count}</th>`;
          }
          if (col.key === "item_name" && totals.items_count !== undefined) {
            return `<th>${totals.items_count}</th>`;
          }
          return "<th></th>";
        }).join("");
      } else {
        reportFooter.classList.add("d-none");
        reportFooterRow.innerHTML = "";
      }
    }

    function buildPayload() {
      return {
        date_from: filterDateFrom.value || null,
        date_to: filterDateTo.value || null,
        customer_id: filterCustomer.value || null,
        rep_id: filterRep.value || null,
        warehouse_id: filterWarehouse.value || null,
        item_id: filterItem.value || null,
        category_id: filterCategory.value || null,
        invoice_type: filterInvoiceType.value || null,
        doc_no: filterDocNo.value || null,
        sort_by: filterSortBy.value || "date",
        sort_dir: filterSortDir.value || "asc"
      };
    }

    async function fetchReport() {
      hideAlert();
      setLoading(true);
      try {
        const res = await fetch(`/api/sales/reports/${state.reportKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildPayload())
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "حدث خطأ أثناء جلب التقرير.");
        renderTable(data);
      } catch (err) {
        showAlert(err.message || "تعذر تحميل التقرير.");
      } finally {
        setLoading(false);
      }
    }

    async function loadLookups() {
      const [customersRes, repsRes, itemsRes, categoriesRes, warehousesRes] = await Promise.all([
        fetch("/api/lookups/customers"),
        fetch("/api/lookups/reps"),
        fetch("/api/lookups/items"),
        fetch("/api/lookups/categories"),
        fetch("/api/lookups/warehouses")
      ]);

      const customers = customersRes.ok ? await customersRes.json() : [];
      const reps = repsRes.ok ? await repsRes.json() : [];
      const items = itemsRes.ok ? await itemsRes.json() : [];
      const categories = categoriesRes.ok ? await categoriesRes.json() : [];
      const warehouses = warehousesRes.ok ? await warehousesRes.json() : [];

      customers.forEach((cust) => {
        const opt = document.createElement("option");
        opt.value = cust.id;
        opt.textContent = cust.name;
        filterCustomer.appendChild(opt);
      });
      reps.forEach((rep) => {
        const opt = document.createElement("option");
        opt.value = rep.id;
        opt.textContent = rep.name;
        filterRep.appendChild(opt);
      });
      items.forEach((itm) => {
        const opt = document.createElement("option");
        opt.value = itm.id;
        opt.textContent = itm.name;
        filterItem.appendChild(opt);
      });
      categories.forEach((cat) => {
        const opt = document.createElement("option");
        opt.value = cat.id;
        opt.textContent = cat.name;
        filterCategory.appendChild(opt);
      });
      warehouses.forEach((wh) => {
        const opt = document.createElement("option");
        opt.value = wh.id;
        opt.textContent = wh.name;
        filterWarehouse.appendChild(opt);
      });
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        state.reportKey = tab.dataset.report;
        applyFiltersUI();
        renderTable({ title_ar: reportConfig[state.reportKey].title_ar, columns: reportConfig[state.reportKey].columns, rows: [] });
      });
    });

    document.getElementById("salesReportsFetch").addEventListener("click", fetchReport);
    document.getElementById("salesReportsPrint").addEventListener("click", () => window.printReport ? window.printReport() : window.print());

    applyFiltersUI();
    loadLookups().catch(() => showAlert("تعذر تحميل بيانات القوائم."));
  })();
</script>
