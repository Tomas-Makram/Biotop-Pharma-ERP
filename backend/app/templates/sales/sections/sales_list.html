<div class="row g-3">
  <div class="col-12">
    <div id="pageAlert" class="alert d-none"></div>
  </div>
  <div class="col-12">
    <div class="card p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h1 class="h4 m-0">تسجيل مبيعات</h1>
        <div class="muted">فاتورة بيع</div>
      </div>

      {% if errors %}
      <div class="alert alert-danger mt-3">
        <ul class="mb-0">
          {% for err in errors %}
          <li>{{ err }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <hr class="my-4" />

      <form id="saleForm"
            class="row g-3"
            hx-post="/sales/new"
            hx-target="#salesSection"
            hx-swap="innerHTML"
            data-alert-success="تم حفظ فاتورة البيع"
            data-alert-fail="فشل حفظ الفاتورة">

        <div class="col-12 col-md-3">
          <label class="form-label">التاريخ</label>
          <input name="date" type="date" class="form-control" value="{{ today }}" />
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label">العميل</label>
          <select name="to_location_id" class="form-select" required>
            <option value="">اختر العميل</option>
            {% for c in customers %}
              <option value="{{ c.id }}" data-type="{{ c.type }}" data-balance="{{ customer_balance_map.get(c.id, 0) }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">فئة التسعير</label>
          <select name="price_category" class="form-select">
            <option value="">بدون</option>
            <option value="جملة">جملة</option>
            <option value="قطاعي">قطاعي</option>
            <option value="خاص">خاص</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">المندوب</label>
          <select name="rep_id" class="form-select">
            <option value="">بدون</option>
            {% for r in reps %}
              <option value="{{ r.id }}">{{ r.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h2 class="h6 m-0">بنود الفاتورة</h2>
            <button type="button" class="btn btn-outline-primary btn-sm" id="addSaleRow">إضافة سطر</button>
          </div>
          <div class="table-responsive">
            <table class="table table-bordered align-middle" id="saleItemsTable">
              <thead class="table-light">
                <tr>
                  <th>الصنف</th>
                  <th style="width: 120px;">الكمية</th>
                  <th style="width: 150px;">سعر البيع</th>
                  <th style="width: 130px;">البونص (علب)</th>
                  <th style="width: 130px;">خصم %</th>
                  <th style="width: 150px;">الإجمالي</th>
                  <th style="width: 80px;">حذف</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <!-- ✅ زر الحفظ: Button فقط (مش submit) -->
        <div class="col-12 d-grid">
          <button class="btn btn-success" type="button" id="saveBtn">حفظ</button>
        </div>

        <!-- ✅ submit مخفي نستخدمه عند الضغط على حفظ فقط -->
        <button type="submit" id="hiddenSubmitBtn" class="d-none" tabindex="-1" aria-hidden="true"></button>
      </form>
    </div>
  </div>

  <div class="col-12">
    <div class="card p-0 overflow-hidden">
      <div class="p-3 d-flex align-items-center justify-content-between">
        <h2 class="h5 m-0">قائمة المبيعات</h2>
        <div class="muted">الإجمالي: <span data-total-count>{{ sales|length }}</span></div>
      </div>
      <div id="salesTableContainer">
        {% include "sales/table.html" %}
      </div>
    </div>
  </div>
</div>

<div id="salesData" class="d-none" data-items='{{ items_json | e }}'></div>

<script>
  (function() {
    const dataEl = document.getElementById('salesData');
    const items = JSON.parse(dataEl.dataset.items || '[]');

    const form = document.getElementById('saleForm');
    const table = document.getElementById('saleItemsTable');
    const tbody = table.querySelector('tbody');
    const addBtn = document.getElementById('addSaleRow');
    const saveBtn = document.getElementById('saveBtn');
    const hiddenSubmitBtn = document.getElementById('hiddenSubmitBtn');

    // ✅ قفل الحفظ: لا Request ولا Submit إلا بزر حفظ
    let allowSave = false;

    function itemOptions() {
      return ['<option value="">اختر الصنف</option>']
        .concat(items.map(i => `<option value="${i.id}" data-price="${i.sale_price || 0}">${i.name}</option>`))
        .join('');
    }

    function calculateLineTotal(row) {
      const qty = parseFloat(row.querySelector('input[name="qty"]').value) || 0;
      const price = parseFloat(row.querySelector('input[name="unit_price"]').value) || 0;
      const bonus = parseFloat(row.querySelector('input[name="bonus_qty"]').value) || 0;
      const discount = parseFloat(row.querySelector('input[name="discount_pct"]').value) || 0;
      
      const subtotal = qty * price;
      const discountAmount = subtotal * (discount / 100);
      const total = subtotal - discountAmount;
      
      row.querySelector('input[name="line_total"]').value = total.toFixed(2);
    }

    function addRow(focus = true) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <select name="item_id" class="form-select item-select" required>
            ${itemOptions()}
          </select>
        </td>
        <td>
          <input name="qty" class="form-control qty-input" type="number" step="0.01" min="0.01" value="1" required />
        </td>
        <td>
          <input name="unit_price" class="form-control price-input" type="number" step="0.01" min="0" value="0" required />
        </td>
        <td>
          <input name="bonus_qty" class="form-control bonus-input" type="number" step="0.01" min="0" value="0" />
        </td>
        <td>
          <input name="discount_pct" class="form-control discount-input" type="number" step="0.01" min="0" max="100" value="0" />
        </td>
        <td>
          <input name="line_total" class="form-control" type="number" step="0.01" min="0" value="0" readonly />
        </td>
        <td class="text-center">
          <button type="button" class="btn btn-sm btn-danger remove-row">حذف</button>
        </td>
      `;
      tbody.appendChild(tr);

      // إضافة مستمعين للأحداث لحساب الإجمالي
      const inputs = tr.querySelectorAll('input.qty-input, input.price-input, input.bonus-input, input.discount-input');
      inputs.forEach(input => {
        input.addEventListener('input', () => calculateLineTotal(tr));
        input.addEventListener('change', () => calculateLineTotal(tr));
      });

      if (focus) {
        tr.querySelector('select[name="item_id"]').focus();
      }
    }

    // إضافة سطر
    addBtn.addEventListener('click', () => addRow(true));

    // حذف سطر
    tbody.addEventListener('click', (e) => {
      if (e.target.classList.contains('remove-row')) {
        e.target.closest('tr').remove();
        if (tbody.children.length === 0) addRow(true);
      }
    });

    // تحديث سعر البيع عند اختيار صنف
    tbody.addEventListener('change', (e) => {
      if (e.target.classList.contains('item-select')) {
        const row = e.target.closest('tr');
        const selectedOption = e.target.selectedOptions[0];
        if (selectedOption && selectedOption.dataset.price) {
          row.querySelector('input[name="unit_price"]').value = selectedOption.dataset.price;
          calculateLineTotal(row);
        }
      }
    });

    /**
     * ✅ Enter داخل جدول البنود = إضافة سطر فقط
     */
    function enterAddsRow(e) {
      if (e.key !== 'Enter') return;
      if (!e.target.closest('#saleItemsTable')) return;

      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();

      allowSave = false; // تأكيد
      addRow(true);
      return false;
    }
    form.addEventListener('keydown', enterAddsRow, true);
    form.addEventListener('keypress', enterAddsRow, true);

    /**
     * ✅ زر حفظ: يسمح بالحفظ مرة واحدة ويعمل submit يدوي
     */
    saveBtn.addEventListener('click', () => {
      // التحقق من وجود بنود على الأقل
      if (tbody.children.length === 0) {
        showAlert('danger', 'يجب إضافة بند واحد على الأقل');
        return;
      }

      // التحقق من اختيار عميل
      const customerSelect = form.querySelector('select[name="to_location_id"]');
      if (!customerSelect.value) {
        showAlert('danger', 'يجب اختيار العميل');
        customerSelect.focus();
        return;
      }

      // التحقق من صحة البيانات في كل بند
      let isValid = true;
      const rows = tbody.querySelectorAll('tr');
      
      for (let row of rows) {
        const itemSelect = row.querySelector('select[name="item_id"]');
        const qtyInput = row.querySelector('input[name="qty"]');
        const priceInput = row.querySelector('input[name="unit_price"]');
        
        if (!itemSelect.value) {
          showAlert('danger', 'يرجى اختيار الصنف في جميع البنود');
          itemSelect.focus();
          isValid = false;
          break;
        }
        
        if (!qtyInput.value || parseFloat(qtyInput.value) <= 0) {
          showAlert('danger', 'الكمية يجب أن تكون أكبر من صفر');
          qtyInput.focus();
          isValid = false;
          break;
        }
        
        if (!priceInput.value || parseFloat(priceInput.value) < 0) {
          showAlert('danger', 'سعر البيع غير صحيح');
          priceInput.focus();
          isValid = false;
          break;
        }
      }

      if (!isValid) return;

      allowSave = true;

      if (form.requestSubmit) {
        form.requestSubmit(hiddenSubmitBtn);
      } else {
        hiddenSubmitBtn.click();
      }
    });

    /**
     * ✅ أمنع submit (حتى لو حصل) إلا لو allowSave=true
     */
    form.addEventListener('submit', (e) => {
      if (!allowSave) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
      }
      allowSave = false; // اقفل بعد الحفظ
    }, true);

    /**
     * ✅ قفل HTMX request نفسه
     */
    document.body.addEventListener('htmx:beforeRequest', (e) => {
      if (e.target !== form) return; // request مش بتاع الفورم ده
      if (!allowSave) {
        e.preventDefault(); // يمنع إرسال الطلب نهائيًا
        return false;
      }
    }, true);

    // دالة مساعدة لإظهار التنبيهات
    function showAlert(type, message) {
      const alertEl = document.getElementById('pageAlert');
      if (alertEl) {
        alertEl.className = `alert alert-${type}`;
        alertEl.textContent = message;
        alertEl.classList.remove('d-none');
        
        setTimeout(() => {
          alertEl.classList.add('d-none');
        }, 5000);
      }
    }

    // أول تحميل
    if (tbody.children.length === 0) {
      addRow(false);
    }
  })();
</script>
