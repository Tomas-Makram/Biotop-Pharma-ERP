<div id="sale-lines">
  {% if message %}
    <div class="p-3">
      <div class="alert alert-danger mb-0">{{ message }}</div>
    </div>
  {% endif %}
  {% if sale %}
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>الصنف</th>
          <th style="width: 120px;">الكمية</th>
          <th style="width: 140px;">سعر الوحدة</th>
          <th style="width: 140px;">الإجمالي</th>
          <th style="width: 200px;" class="text-end">إجراءات</th>
        </tr>
      </thead>
      <tbody>
        {% for line in sale.items %}
        <tr>
          <td>{{ line.item.name if line.item else '-' }}</td>
          <td>{{ line.qty }}</td>
          <td>{{ line.unit_price }}</td>
          <td>{{ line.total }}</td>
          <td class="text-end">
            <details class="d-inline-block">
              <summary class="btn btn-sm btn-outline-secondary">تعديل</summary>
              <form class="mt-2" hx-post="/sales/items/{{ line.id }}/update" hx-target="#sale-lines" hx-swap="innerHTML" data-alert-success="تم تعديل البند" data-alert-fail="فشل تعديل البند">
                <div class="mb-2">
                  <label class="form-label">الكمية</label>
                  <input name="qty" type="number" step="0.01" min="0.01" class="form-control" value="{{ line.qty }}" required />
                </div>
                <div class="mb-2">
                  <label class="form-label">سعر الوحدة</label>
                  <input name="unit_price" type="number" step="0.01" min="0" class="form-control" value="{{ line.unit_price }}" required />
                </div>
                <button class="btn btn-sm btn-success">حفظ</button>
              </form>
            </details>
          </td>
        </tr>
        {% endfor %}
      </tbody>
      <tfoot class="table-light">
        <tr>
          <th colspan="3" class="text-end">الإجمالي</th>
          <th>{{ sale.total }}</th>
          <th></th>
        </tr>
      </tfoot>
    </table>
  </div>
  {% endif %}
</div>
