<div id="sales-opening-table" data-total="{{ customers|length }}">
  {% if customers|length == 0 %}
    <div class="p-3">
      <div class="alert alert-info mb-0">لا توجد جهات حتى الآن.</div>
    </div>
  {% else %}
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 80px;">ID</th>
            <th>العميل</th>
            <th>الرصيد الافتتاحي</th>
          </tr>
        </thead>
        <tbody>
          {% for c in customers %}
          <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.name }}</td>
            <td>{{ opening_map.get(c.id, 0) }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% endif %}
</div>
