<div id="doctor-opening-table" data-total="{{ doctors|length }}">
  {% if doctors|length == 0 %}
    <div class="p-3">
      <div class="alert alert-info mb-0">لا توجد أطباء مضافة حتى الآن.</div>
    </div>
  {% else %}
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 80px;">ID</th>
            <th>الاسم</th>
            <th>الرصيد الافتتاحي</th>
          </tr>
        </thead>
        <tbody>
          {% for d in doctors %}
          <tr>
            <td>{{ d.id }}</td>
            <td>{{ d.name }}</td>
            <td>{{ opening_map.get(d.id, 0) }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% endif %}
</div>
