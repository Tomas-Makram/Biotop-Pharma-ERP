<div class="card p-4">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <h1 class="h4 m-0">رصيد أول مدة</h1>
    <div class="muted">إدخال الرصيد الافتتاحي للطبيب</div>
  </div>

  <hr class="my-4"/>

  <form class="row g-3 align-items-end" hx-post="/doctors/opening" hx-target="#openingTableContainer" hx-swap="innerHTML" data-alert-success="تم حفظ الرصيد الافتتاحي" data-alert-fail="تعذر حفظ الرصيد الافتتاحي">
    <div class="col-12 col-md-6">
      <label class="form-label">الطبيب</label>
      <select name="doctor_id" class="form-select" required>
        <option value="">اختر الطبيب</option>
        {% for d in doctors %}
          <option value="{{ d.id }}">{{ d.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">الرصيد الافتتاحي</label>
      <input name="amount" type="number" step="0.01" class="form-control" value="0" />
    </div>
    <div class="col-12 col-md-2 d-grid">
      <button class="btn btn-success" type="submit">حفظ</button>
    </div>
  </form>
</div>

<div class="card p-0 overflow-hidden mt-3">
  <div class="p-3 d-flex align-items-center justify-content-between">
    <h2 class="h5 m-0">أرصدة الأطباء</h2>
    <div class="muted">الإجمالي: <span data-total-count>{{ doctors|length }}</span></div>
  </div>
  <div id="openingTableContainer">
    {% include "doctors/opening_table.html" %}
  </div>
</div>
