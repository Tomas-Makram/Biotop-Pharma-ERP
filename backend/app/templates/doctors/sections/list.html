<div id="pageAlert" class="alert d-none"></div>

<div class="card p-4 mb-3">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <h1 class="h3 m-0">الأطباء</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="/print/doctors" target="_blank">طباعة</a>
      <div class="muted">إدارة بيانات الأطباء</div>
    </div>
  </div>

  <hr class="my-4"/>

  <form id="doctorForm" class="row g-3 align-items-end" hx-post="/doctors" hx-target="#tableContainer" hx-swap="innerHTML" hx-on="htmx:afterRequest: this.reset()" data-alert-success="تم إضافة الطبيب بنجاح" data-alert-fail="تعذر إضافة الطبيب">
    <div class="col-12 col-md-5">
      <label class="form-label">الاسم</label>
      <input name="name" class="form-control" required />
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">الهاتف</label>
      <input name="phone" class="form-control" />
    </div>
    <div class="col-12 col-md-3 d-grid">
      <button class="btn btn-success" type="submit">حفظ</button>
    </div>
  </form>
</div>

<div class="card p-0 overflow-hidden">
  <div class="p-3 d-flex align-items-center justify-content-between">
    <h2 class="h5 m-0">قائمة الأطباء</h2>
    <div class="d-flex gap-2">
      <input class="form-control form-control-sm" type="text" name="q" placeholder="بحث" value="{{ q }}"
             hx-get="/doctors/table" hx-trigger="keyup changed delay:400ms" hx-target="#tableContainer" />
      <div class="muted">الإجمالي: <span data-total-count>{{ doctors|length }}</span></div>
    </div>
  </div>
  <div id="tableContainer">
    {% include "doctors/table.html" %}
  </div>
</div>
