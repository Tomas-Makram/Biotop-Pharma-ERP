<div class="table-responsive">
  <table class="table table-hover mb-0">
    <thead class="table-light">
      <tr>
        <th>الخزنة</th>
        <th>الرصيد الافتتاحي</th>
      </tr>
    </thead>
    <tbody>
      {% for acc in accounts %}
      <tr>
        <td>{{ acc.name }}</td>
        <td>{{ '%.2f'|format(opening_map.get(acc.id, 0)) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
