<div class="row g-3">
  <div class="col-12">
    <div id="pageAlert" class="alert d-none"></div>
  </div>
  <div class="col-12">
    <div class="card p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h1 class="h4 m-0">إشعار خصم / إضافة</h1>
        <div class="muted">تسجيل إشعارات الخصم والإضافة للموردين</div>
      </div>

      <hr class="my-4" />

      <form class="row g-3" hx-post="/suppliers/adjustments" hx-target="#adjustmentsTableContainer" hx-swap="innerHTML" hx-on="htmx:afterRequest: this.reset()" data-alert-success="تم تسجيل الإشعار" data-alert-fail="فشل تسجيل الإشعار">
        <div class="col-12 col-md-5">
          <label class="form-label">المورد</label>
          <select name="supplier_id" class="form-select" required>
            <option value="">اختر المورد</option>
            {% for s in suppliers %}
              <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label">التاريخ</label>
          <input name="date" type="date" class="form-control" value="{{ today }}" />
        </div>

        <div class="col-12 col-md-4">
          <label class="form-label">القيمة</label>
          <input name="amount" type="number" step="0.01" class="form-control" required />
        </div>
        <div class="col-12 col-md-8">
          <label class="form-label">وذلك عن</label>
          <input name="notes" class="form-control" />
        </div>

        <div class="col-12">
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="adjustment_type" id="adjDiscount" value="discount" checked>
              <label class="form-check-label" for="adjDiscount">إشعار خصم</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="adjustment_type" id="adjAddition" value="addition">
              <label class="form-check-label" for="adjAddition">إشعار إضافة</label>
            </div>
          </div>
        </div>

        <div class="col-12 d-grid">
          <button class="btn btn-success" type="submit">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="col-12">
    <div class="card p-0 overflow-hidden">
      <div class="p-3">
        <h2 class="h5 m-0">قائمة الإشعارات</h2>
      </div>
      <div id="adjustmentsTableContainer">
        {% include "suppliers/adjustments_table.html" %}
      </div>
    </div>
  </div>
</div>
