{% extends "base.html" %}

{% block title %}فئات الأصناف{% endblock %}

{% block content %}
<div class="row g-3">
  <div class="col-12">
    <div id="pageAlert" class="alert d-none"></div>
  </div>
  <div class="col-12">
    <div class="card p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h1 class="h3 m-0">فئات الأصناف</h1>
        <div class="muted">إضافة فئة جديدة</div>
      </div>

      <hr class="my-4" />

      <form class="row g-3 align-items-end" hx-post="/categories" hx-target="#tableContainer" hx-swap="innerHTML" hx-on="htmx:afterRequest: this.reset()" data-alert-success="تمت إضافة الفئة" data-alert-fail="فشل إضافة الفئة">
        <div class="col-12 col-md-4">
          <label class="form-label">اسم الفئة</label>
          <input name="name" class="form-control" required />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">ملاحظات</label>
          <input name="notes" class="form-control" />
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button class="btn btn-success" type="submit">إضافة</button>
        </div>
      </form>
    </div>
  </div>

  <div class="col-12">
    <div class="card p-0 overflow-hidden">
      <div class="p-3 d-flex align-items-center justify-content-between">
        <h2 class="h5 m-0">قائمة الفئات</h2>
        <div class="muted">الإجمالي: <span data-total-count>{{ categories|length }}</span></div>
      </div>
      <div id="tableContainer">
        {% include "categories/table.html" %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
