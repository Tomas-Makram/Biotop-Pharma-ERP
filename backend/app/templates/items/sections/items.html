<div class="row g-3">
  <div class="col-12">
    <div id="pageAlert" class="alert d-none"></div>
  </div>
  <div class="col-12">
    <div class="card p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h2 class="h4 m-0">تسجيل الأصناف</h2>
        <div class="muted">إضافة صنف جديد</div>
      </div>

      <hr class="my-4" />

      <form class="row g-3 align-items-end" hx-post="/items" hx-target="#itemsTableContainer" hx-swap="innerHTML" hx-on="htmx:afterRequest: this.reset()" data-alert-success="تمت إضافة الصنف" data-alert-fail="فشل إضافة الصنف">
        <div class="col-12 col-md-3">
          <label class="form-label">اسم الصنف</label>
          <input name="name" class="form-control" required />
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label">فئة الصنف</label>
          <select name="item_kind" class="form-select">
            <option value="general">عام</option>
            <option value="private">خاص</option>
          </select>
        </div>
        <div class="col-12 col-md-1">
          <label class="form-label">الوحدة</label>
          <input name="unit" class="form-control" value="علبة" />
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label">سعر البيع</label>
          <input name="sale_price" class="form-control" type="number" step="0.01" value="0" />
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label">ملاحظات</label>
          <input name="notes" class="form-control" />
        </div>
        <div class="col-12 col-md-2">
          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" name="is_active" checked />
            <label class="form-check-label">نشط</label>
          </div>
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button class="btn btn-success" type="submit">إضافة</button>
        </div>
      </form>
    </div>
  </div>

  <div class="col-12">
    <div class="card p-0 overflow-hidden">
      <div class="p-3 d-flex align-items-center justify-content-between">
        <h2 class="h5 m-0">قائمة الأصناف</h2>
        <div class="d-flex gap-2">
          <input class="form-control" name="q" value="{{ q }}" placeholder="بحث بالاسم" hx-get="/items/table" hx-trigger="keyup changed delay:400ms" hx-target="#itemsTableContainer" />
          <div class="muted">الإجمالي: <span data-total-count>{{ items|length }}</span></div>
        </div>
      </div>
      <div id="itemsTableContainer">
        {% include "items/table.html" %}
      </div>
    </div>
  </div>
</div>
